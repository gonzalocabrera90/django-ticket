version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      # Configuración interna del contenedor de Postgres
      - POSTGRES_DB=django_ticket_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password_1234  # Pon la contraseña que quieras usar
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      # Estas variables las leerá tu settings.py mediante os.environ.get
      - DB_NAME=django_ticket_db
      - DB_USER=postgres
      - DB_PASSWORD=password_1234
      - DB_HOST=db  # "db" coincide con el nombre del servicio de arriba
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data: