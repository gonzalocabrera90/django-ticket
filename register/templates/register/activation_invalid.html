{% extends 'base.html' %}

{% block content %}

<section>

    <h1>

        Link inválido

    </h1>

    <p>

        El enlace de activación no es válido o expiró.

    </p>

    <form
        method="POST"
        action="{% url 'resend-activation-email' %}"
    >

        {% csrf_token %}

        <button type="submit">

            Reenviar email

        </button>

    </form>

</section>

{% endblock %}
