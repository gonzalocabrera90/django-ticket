{% load static %}

{% block title %}
   Contraseña | EventLive
{% endblock %}

{% block extra_css %}

<link
    rel="stylesheet"
    href="{% static 'login/css/auth_styles.css' %}"
>

{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Recuperar Contraseña</h2>
        <p class="auth-subtitle">Ingresá tu correo electrónico y te enviaremos un enlace para generar una nueva clave.</p>
        
        <form method="POST" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Enviar enlace de recuperación</button>
        </form>
    </div>
</div>
{% endblock %}
